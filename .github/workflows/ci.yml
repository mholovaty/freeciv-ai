name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Detects whether we are running inside the 'act' local runner.
  # Exposes the result as a job output so other jobs can use the
  # 'needs' context (which act's schema validator accepts at job level,
  # unlike the 'env' context).
  detect-runner:
    runs-on: ubuntu-latest
    outputs:
      is-act: ${{ steps.check.outputs.is-act }}
    steps:
      - id: check
        run: echo "is-act=${ACT:-false}" >> $GITHUB_OUTPUT
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/build

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python package
        run: pip install -e "python/[dev]"

      - name: Test
        working-directory: python
        run: |
          python3 -m pytest -v \
            --ignore=tests/test_env.py \
            --ignore=tests/test_smoke.py

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/build
        with:
          extra-packages: clang-tidy

      # Checks mirror the Diagnostics.ClangTidy settings in .clangd.
      # Only analyse our own sources — not the freeciv subproject.
      - name: C static analysis
        run: |
          find src/freeciv-ai-lib -name '*.c' | xargs clang-tidy -p builddir \
            --checks='-*,bugprone-*,cert-*,misc-*,performance-*,\
          -modernize-*,-cppcoreguidelines-*,-google-*,-hicpp-*,\
          -fuchsia-*,-abseil-*,-objc-*,-llvm-*,-llvmlibc-*,\
          -bugprone-macro-parentheses,-cert-err58-cpp,\
          -misc-non-private-member-variables-in-classes'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Python linting
        run: |
          pip install ruff
          ruff check python/

  # CodeQL security analysis for C/C++ and Python sources.
  # Results are uploaded to the GitHub Security tab (SARIF).
  # This job does not run correctly with 'act' — it requires the real
  # GitHub Actions environment to download the CodeQL bundle and upload results.
  codeql:
    needs: detect-runner
    if: needs.detect-runner.outputs.is-act != 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, python]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # CodeQL instruments the compiler at the OS level, so builds that run
      # through a composite action are traced correctly.
      - uses: ./.github/actions/build
        if: matrix.language == 'c-cpp'

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: ${{ matrix.language }}
